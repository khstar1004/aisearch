<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Real Marqo Engine Demo</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --text: #17202a;
      --muted: #657386;
      --line: #d7dde8;
      --accent: #0f766e;
      --accent2: #2563eb;
      --danger: #b42318;
      --ok: #15803d;
      --shadow: 0 10px 28px rgba(23, 32, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, input, select { font: inherit; letter-spacing: 0; }

    button {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      padding: 0 14px;
      font-weight: 720;
      cursor: pointer;
    }

    button:hover { filter: brightness(0.94); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    button.secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      min-height: 38px;
      padding: 8px 10px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: #111827;
      color: #fff;
      padding: 16px 22px;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 18px; line-height: 1.2; }
    header p { color: #cbd5e1; font-size: 13px; margin-top: 3px; }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #d9fce8;
      font-size: 13px;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #94a3b8;
    }

    .dot.ok { background: #22c55e; }
    .dot.err { background: #ef4444; }

    main {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 16px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .section {
      padding: 15px;
      display: grid;
      gap: 12px;
    }

    .section + .section { border-top: 1px solid var(--line); }

    .section h2 {
      font-size: 13px;
      text-transform: uppercase;
      color: #334155;
    }

    .field { display: grid; gap: 5px; }
    label { font-size: 12px; color: var(--muted); font-weight: 680; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
    }

    .metric strong {
      display: block;
      margin-top: 5px;
      font-size: 22px;
      line-height: 1;
    }

    .work {
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .search {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 130px 96px;
      gap: 10px;
      padding: 14px;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 9px;
      min-width: 0;
    }

    .card h3 {
      font-size: 15px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .scoreline {
      display: grid;
      gap: 5px;
    }

    .scoretop {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 720;
    }

    .bar {
      height: 7px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: var(--accent2);
      width: 0;
    }

    .log {
      background: #0f172a;
      color: #d6e7ff;
      border-radius: 6px;
      padding: 10px;
      min-height: 210px;
      max-height: 330px;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .error { color: var(--danger); }
    .oktext { color: var(--ok); }

    @media (max-width: 940px) {
      main { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; }
      .row, .search, .metrics { grid-template-columns: 1fr; }
      main { padding: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Real Marqo Engine Demo</h1>
      <p>Live API, Vespa indexing, vector/lexical/hybrid search</p>
    </div>
    <div class="status"><span class="dot" id="dot"></span><span id="status">checking</span></div>
  </header>

  <main>
    <aside class="panel">
      <section class="section">
        <h2>Setup</h2>
        <div class="field">
          <label for="indexName">Index name</label>
          <input id="indexName" value="marqo-ui-demo">
        </div>
        <div class="row">
          <div class="field">
            <label for="docCount">Documents</label>
            <input id="docCount" type="number" min="100" max="50000" step="100" value="2000">
          </div>
          <div class="field">
            <label for="batchSize">Batch size</label>
            <input id="batchSize" type="number" min="10" max="500" step="10" value="100">
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="dims">Vector dims</label>
            <input id="dims" type="number" min="64" max="1536" step="64" value="384">
          </div>
          <div class="field">
            <label for="seed">Seed</label>
            <input id="seed" type="number" value="17">
          </div>
        </div>
        <div class="actions">
          <button id="healthBtn" class="secondary">Health</button>
          <button id="setupBtn">Create + Index</button>
          <button id="deleteBtn" class="secondary">Delete</button>
        </div>
      </section>

      <section class="section">
        <h2>Trace</h2>
        <div class="log" id="log"></div>
      </section>
    </aside>

    <section class="work">
      <div class="metrics">
        <div class="metric"><span>Docs indexed</span><strong id="mDocs">0</strong></div>
        <div class="metric"><span>Index throughput</span><strong id="mThroughput">0/s</strong></div>
        <div class="metric"><span>Search latency</span><strong id="mLatency">0ms</strong></div>
        <div class="metric"><span>Top score</span><strong id="mScore">0.00</strong></div>
      </div>

      <div class="panel">
        <div class="search">
          <input id="query" value="waterproof gear for running in rain">
          <select id="method">
            <option>TENSOR</option>
            <option>LEXICAL</option>
            <option>HYBRID</option>
          </select>
          <button id="searchBtn">Search</button>
        </div>
      </div>

      <div class="results" id="results"></div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = { docs: 0, running: false };

    const products = {
      outerwear: ["rain jacket", "fleece hoodie", "wool coat", "shell parka", "bomber jacket"],
      footwear: ["trail running shoe", "leather boot", "white sneaker", "hiking sandal", "training shoe"],
      electronics: ["wireless earbuds", "noise cancelling headphones", "smart watch", "portable speaker", "camera bag"],
      home: ["espresso machine", "ceramic vase", "linen bedding", "desk lamp", "office chair"],
      beauty: ["mineral sunscreen", "hydrating serum", "matte lipstick", "daily moisturizer", "cleanser gel"]
    };
    const colors = ["black", "navy", "red", "white", "green", "silver", "tan", "charcoal", "blue", "cream"];
    const brands = ["Aster", "Northline", "Kura", "Motive", "Solace", "Oakfield", "Vela", "Ridge"];
    const qualities = ["lightweight", "waterproof", "breathable", "premium", "compact", "durable", "soft", "minimal", "high grip", "quick dry", "noise reducing", "daily use"];
    const uses = ["for commuting", "for rainy trail runs", "for small apartments", "for sensitive skin", "for long flights", "for gym training", "for weekend travel", "for office work", "for holiday gifting", "for mountain hiking"];

    function rng(seed) {
      let value = seed >>> 0;
      return () => {
        value = (value * 1664525 + 1013904223) >>> 0;
        return value / 4294967296;
      };
    }

    function pick(rand, arr) {
      return arr[Math.floor(rand() * arr.length)];
    }

    function makeDocs(count, seed) {
      const rand = rng(seed);
      const categories = Object.keys(products);
      const docs = [];
      for (let i = 0; i < count; i += 1) {
        const category = pick(rand, categories);
        const product = pick(rand, products[category]);
        const color = pick(rand, colors);
        const brand = pick(rand, brands);
        const quality = pick(rand, qualities);
        const use = pick(rand, uses);
        const title = `${brand} ${color} ${product}`;
        docs.push({
          _id: `ui-${String(i).padStart(5, "0")}-${Math.floor(rand() * 1e8).toString(36)}`,
          title,
          description: `${quality} ${product} ${use}. Indexed through the live Marqo engine.`,
          category,
          brand,
          color,
          price: Math.round((12 + rand() * 408) * 100) / 100,
          popularity: Math.floor(1 + rand() * 1000)
        });
      }
      return docs;
    }

    function setBusy(value) {
      state.running = value;
      for (const id of ["setupBtn", "deleteBtn", "searchBtn", "healthBtn"]) $(id).disabled = value;
    }

    function setStatus(text, kind) {
      $("status").textContent = text;
      $("dot").className = `dot ${kind || ""}`;
    }

    function log(line) {
      $("log").textContent = `${new Date().toLocaleTimeString()}  ${line}\n` + $("log").textContent;
    }

    async function api(method, path, body) {
      const started = performance.now();
      const response = await fetch(`/marqo${path}`, {
        method,
        headers: body ? { "Content-Type": "application/json" } : {},
        body: body ? JSON.stringify(body) : undefined
      });
      const text = await response.text();
      const elapsed = performance.now() - started;
      let data = {};
      if (text) {
        try { data = JSON.parse(text); } catch { data = { raw: text }; }
      }
      if (!response.ok) {
        throw new Error(`${method} ${path} -> ${response.status}: ${JSON.stringify(data)}`);
      }
      return { data, elapsed };
    }

    async function health() {
      try {
        const { data, elapsed } = await api("GET", "/");
        setStatus(`ready ${data.version || ""}`, "ok");
        log(`GET / ${elapsed.toFixed(1)} ms`);
      } catch (error) {
        setStatus("not ready", "err");
        log(`health failed: ${error.message}`);
      }
    }

    async function deleteIndex() {
      const index = $("indexName").value.trim();
      try {
        const { elapsed } = await api("DELETE", `/indexes/${encodeURIComponent(index)}`);
        state.docs = 0;
        $("mDocs").textContent = "0";
        $("mThroughput").textContent = "0/s";
        $("results").innerHTML = "";
        log(`DELETE /indexes/${index} ${elapsed.toFixed(1)} ms`);
      } catch (error) {
        log(`delete skipped: ${error.message}`);
      }
    }

    async function createAndIndex() {
      setBusy(true);
      const index = $("indexName").value.trim();
      const count = Number($("docCount").value);
      const batchSize = Number($("batchSize").value);
      const dims = Number($("dims").value);
      const seed = Number($("seed").value);
      try {
        await deleteIndex();
        const settings = {
          model: "demo/random-ui",
          modelProperties: { name: "demo/random-ui", type: "random", dimensions: dims },
          normalizeEmbeddings: true
        };
        const created = await api("POST", `/indexes/${encodeURIComponent(index)}`, settings);
        log(`POST /indexes/${index} ${created.elapsed.toFixed(1)} ms`);

        const docs = makeDocs(count, seed);
        const start = performance.now();
        state.docs = 0;
        for (let i = 0; i < docs.length; i += batchSize) {
          const batch = docs.slice(i, i + batchSize);
          const payload = { documents: batch, tensorFields: ["title", "description", "category"] };
          const result = await api("POST", `/indexes/${encodeURIComponent(index)}/documents`, payload);
          state.docs += batch.length;
          $("mDocs").textContent = String(state.docs);
          const seconds = (performance.now() - start) / 1000;
          $("mThroughput").textContent = `${Math.round(state.docs / Math.max(seconds, 0.1))}/s`;
          log(`POST documents batch ${Math.floor(i / batchSize) + 1} ${batch.length} docs ${result.elapsed.toFixed(1)} ms`);
        }
        await search();
      } catch (error) {
        setStatus("error", "err");
        log(`setup failed: ${error.message}`);
      } finally {
        setBusy(false);
      }
    }

    async function search() {
      setBusy(true);
      const index = $("indexName").value.trim();
      const payload = {
        q: $("query").value.trim(),
        searchMethod: $("method").value,
        limit: 12,
        attributesToRetrieve: ["title", "description", "category", "brand", "color", "price", "popularity"]
      };
      try {
        const { data, elapsed } = await api("POST", `/indexes/${encodeURIComponent(index)}/search`, payload);
        $("mLatency").textContent = `${elapsed.toFixed(0)}ms`;
        const hits = data.hits || [];
        $("mScore").textContent = hits[0] && hits[0]._score ? Number(hits[0]._score).toFixed(2) : "0.00";
        renderResults(hits);
        log(`POST search ${payload.searchMethod} ${elapsed.toFixed(1)} ms hits=${hits.length}`);
      } catch (error) {
        log(`search failed: ${error.message}`);
      } finally {
        setBusy(false);
      }
    }

    function renderResults(hits) {
      $("results").innerHTML = hits.map((hit) => {
        const score = Number(hit._score || 0);
        const width = Math.max(4, Math.min(100, score * 100));
        return `
          <article class="card">
            <h3>${escapeHtml(hit.title || hit._id || "Untitled")}</h3>
            <div class="meta">${escapeHtml(hit.category || "")} / ${escapeHtml(hit.brand || "")} / ${escapeHtml(hit.color || "")}</div>
            <div class="meta">${escapeHtml(hit.description || "")}</div>
            <div class="scoreline">
              <div class="scoretop"><span>score</span><span>${score.toFixed(4)}</span></div>
              <div class="bar"><div class="fill" style="width:${width}%"></div></div>
            </div>
          </article>`;
      }).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    $("healthBtn").addEventListener("click", health);
    $("setupBtn").addEventListener("click", createAndIndex);
    $("deleteBtn").addEventListener("click", async () => { setBusy(true); await deleteIndex(); setBusy(false); });
    $("searchBtn").addEventListener("click", search);
    $("query").addEventListener("keydown", (event) => { if (event.key === "Enter") search(); });
    health();
  </script>
</body>
</html>
