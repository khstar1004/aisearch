# Apache 2.4 reverse proxy for Haeorum AI Search.
# Install on server82 as /etc/httpd/conf.d/haeorum-ai-search.conf after DNS/TLS is ready.

<VirtualHost *:80>
    ServerName ai-search.haeorumgift.com
    Redirect permanent / https://ai-search.haeorumgift.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName ai-search.haeorumgift.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/ai-search.haeorumgift.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/ai-search.haeorumgift.com/privkey.pem

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyTimeout 180
    Timeout 180
    LimitRequestBody 6291456

    SetEnvIf Remote_Addr "(.+)" CLIENT_REMOTE_ADDR=$1
    RequestHeader unset Forwarded early
    RequestHeader unset X-Forwarded-For early
    RequestHeader unset X-Real-IP early
    RequestHeader set X-Forwarded-Proto "https" early
    RequestHeader set X-Forwarded-For "%{CLIENT_REMOTE_ADDR}e" early
    RequestHeader set X-Real-IP "%{CLIENT_REMOTE_ADDR}e" early

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ProxyPass        / http://127.0.0.1:8120/ retry=0 timeout=180 keepalive=On
    ProxyPassReverse / http://127.0.0.1:8120/
</VirtualHost>
