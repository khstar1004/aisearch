upstream haeorum_ai_search_api {
    least_conn;
    server 127.0.0.1:8120 max_fails=3 fail_timeout=10s;
    # Add more API servers when scaling horizontally:
    # server 10.0.0.12:8000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

server {
    listen 80;
    server_name ai-search.haeorumgift.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ai-search.haeorumgift.com;

    ssl_certificate /etc/letsencrypt/live/ai-search.haeorumgift.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-search.haeorumgift.com/privkey.pem;

    client_max_body_size 6m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /widget.js {
        proxy_pass http://haeorum_ai_search_api/widget.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-Proto https;
        expires 10m;
    }

    location / {
        proxy_pass http://haeorum_ai_search_api;
        proxy_http_version 1.1;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-Proto https;
    }
}
