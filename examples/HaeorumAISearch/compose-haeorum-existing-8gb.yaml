name: haeorum-ai-search-marqo

services:
  vespa:
    mem_limit: "${VESPA_MEM_LIMIT:-4g}"

  mioc:
    mem_limit: "${MIOC_MEM_LIMIT:-768m}"

  marqo-api:
    mem_limit: "${MARQO_API_MEM_LIMIT:-768m}"
    environment:
      MARQO_API_WORKERS: "${MARQO_API_WORKERS:-1}"
      MARQO_MAX_CONCURRENT_SEARCH: "${MARQO_MAX_CONCURRENT_SEARCH:-24}"
      MARQO_INFERENCE_POOL_SIZE: "${MARQO_INFERENCE_POOL_SIZE:-32}"
      VESPA_POOL_SIZE: "${VESPA_POOL_SIZE:-32}"
      VESPA_SEARCH_TIMEOUT_MS: "${VESPA_SEARCH_TIMEOUT_MS:-5000}"
      MARQO_API_INFERENCE_CACHE_SIZE: "${MARQO_API_INFERENCE_CACHE_SIZE:-32}"

  embedding-service:
    mem_limit: "${GEMINI_PROXY_MEM_LIMIT:-512m}"
    environment:
      GEMINI_EMBEDDING_TIMEOUT_SECONDS: "${GEMINI_EMBEDDING_TIMEOUT_SECONDS:-90}"
      GEMINI_PROXY_MAX_INPUTS_PER_REQUEST: "${GEMINI_PROXY_MAX_INPUTS_PER_REQUEST:-64}"
      GEMINI_PROXY_MAX_CONCURRENT_CALLS: "${GEMINI_PROXY_MAX_CONCURRENT_CALLS:-12}"
      GEMINI_PROXY_QUEUE_TIMEOUT_SECONDS: "${GEMINI_PROXY_QUEUE_TIMEOUT_SECONDS:-15}"
      GEMINI_PROXY_RATE_LIMIT_RPM: "${GEMINI_PROXY_RATE_LIMIT_RPM:-1200}"
      GEMINI_PROXY_RATE_LIMIT_BURST: "${GEMINI_PROXY_RATE_LIMIT_BURST:-240}"

  ai-search:
    mem_limit: "${HAEORUM_AI_SEARCH_MEM_LIMIT:-512m}"
    environment:
      HAEORUM_SEARCH_MAX_CONCURRENCY: "${HAEORUM_SEARCH_MAX_CONCURRENCY:-16}"
      HAEORUM_SEARCH_QUEUE_TIMEOUT_SECONDS: "${HAEORUM_SEARCH_QUEUE_TIMEOUT_SECONDS:-2}"
      HAEORUM_IMAGE_SEARCH_MAX_CONCURRENCY: "${HAEORUM_IMAGE_SEARCH_MAX_CONCURRENCY:-3}"
      HAEORUM_IMAGE_SEARCH_QUEUE_TIMEOUT_SECONDS: "${HAEORUM_IMAGE_SEARCH_QUEUE_TIMEOUT_SECONDS:-2}"
      HAEORUM_API_THREADPOOL_TOKENS: "${HAEORUM_API_THREADPOOL_TOKENS:-28}"
      HAEORUM_BACKEND_HTTP_MAX_ACTIVE_REQUESTS: "${HAEORUM_BACKEND_HTTP_MAX_ACTIVE_REQUESTS:-24}"
      HAEORUM_BACKEND_HTTP_CONNECTION_ACQUIRE_TIMEOUT_SECONDS: "${HAEORUM_BACKEND_HTTP_CONNECTION_ACQUIRE_TIMEOUT_SECONDS:-1}"
      HAEORUM_CACHE_TTL_SECONDS: "${HAEORUM_CACHE_TTL_SECONDS:-120}"
      HAEORUM_CACHE_MAX_ENTRIES: "${HAEORUM_CACHE_MAX_ENTRIES:-5000}"
      HAEORUM_GEMINI_QUERY_RUNTIME_TEXT_CACHE_ENTRIES: "${HAEORUM_GEMINI_QUERY_RUNTIME_TEXT_CACHE_ENTRIES:-2048}"
      HAEORUM_GEMINI_QUERY_RUNTIME_IMAGE_CACHE_ENTRIES: "${HAEORUM_GEMINI_QUERY_RUNTIME_IMAGE_CACHE_ENTRIES:-256}"
      HAEORUM_GEMINI_QUERY_TIMEOUT_SECONDS: "${HAEORUM_GEMINI_QUERY_TIMEOUT_SECONDS:-30}"
      HAEORUM_GEMINI_MIXED_QUERY_PARALLELISM: "${HAEORUM_GEMINI_MIXED_QUERY_PARALLELISM:-2}"
      HAEORUM_MARQO_ADD_DOCUMENTS_BATCH_SIZE: "${HAEORUM_MARQO_ADD_DOCUMENTS_BATCH_SIZE:-12}"
      HAEORUM_MARQO_ADD_DOCUMENTS_MAX_REQUEST_BYTES: "${HAEORUM_MARQO_ADD_DOCUMENTS_MAX_REQUEST_BYTES:-2097152}"
      HAEORUM_PRODUCT_IMAGE_DOWNLOAD_THREAD_COUNT: "${HAEORUM_PRODUCT_IMAGE_DOWNLOAD_THREAD_COUNT:-2}"
      HAEORUM_SEARCH_RATE_LIMIT_PER_MINUTE: "${HAEORUM_SEARCH_RATE_LIMIT_PER_MINUTE:-300}"
      HAEORUM_IMAGE_RATE_LIMIT_PER_MINUTE: "${HAEORUM_IMAGE_RATE_LIMIT_PER_MINUTE:-60}"

  reindex-once:
    mem_limit: "${HAEORUM_REINDEX_MEM_LIMIT:-512m}"
    environment:
      HAEORUM_GEMINI_QUERY_TIMEOUT_SECONDS: "${HAEORUM_GEMINI_QUERY_TIMEOUT_SECONDS:-30}"
      HAEORUM_GEMINI_MIXED_QUERY_PARALLELISM: "${HAEORUM_GEMINI_MIXED_QUERY_PARALLELISM:-2}"
      HAEORUM_MARQO_ADD_DOCUMENTS_BATCH_SIZE: "${HAEORUM_MARQO_ADD_DOCUMENTS_BATCH_SIZE:-12}"
      HAEORUM_MARQO_ADD_DOCUMENTS_MAX_REQUEST_BYTES: "${HAEORUM_MARQO_ADD_DOCUMENTS_MAX_REQUEST_BYTES:-2097152}"
      HAEORUM_PRODUCT_IMAGE_DOWNLOAD_THREAD_COUNT: "${HAEORUM_PRODUCT_IMAGE_DOWNLOAD_THREAD_COUNT:-2}"

  sync-worker:
    mem_limit: "${HAEORUM_SYNC_WORKER_MEM_LIMIT:-512m}"
    environment:
      HAEORUM_GEMINI_QUERY_TIMEOUT_SECONDS: "${HAEORUM_GEMINI_QUERY_TIMEOUT_SECONDS:-30}"
      HAEORUM_GEMINI_MIXED_QUERY_PARALLELISM: "${HAEORUM_GEMINI_MIXED_QUERY_PARALLELISM:-2}"
      HAEORUM_MARQO_ADD_DOCUMENTS_BATCH_SIZE: "${HAEORUM_MARQO_ADD_DOCUMENTS_BATCH_SIZE:-12}"
      HAEORUM_MARQO_ADD_DOCUMENTS_MAX_REQUEST_BYTES: "${HAEORUM_MARQO_ADD_DOCUMENTS_MAX_REQUEST_BYTES:-2097152}"
      HAEORUM_PRODUCT_IMAGE_DOWNLOAD_THREAD_COUNT: "${HAEORUM_PRODUCT_IMAGE_DOWNLOAD_THREAD_COUNT:-2}"
