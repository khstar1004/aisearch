name: haeorum-ai-search-marqo

services:
  ai-search:
    build:
      args:
        INSTALL_MSSQL_ODBC: "true"
        ACCEPT_MS_ODBC_EULA: "true"
    environment:
      HAEORUM_PRODUCT_CSV: ""
      HAEORUM_MSSQL_READONLY_CONNECTION_STRING: "${HAEORUM_MSSQL_READONLY_CONNECTION_STRING:?Set HAEORUM_MSSQL_READONLY_CONNECTION_STRING for local MSSQL reindex}"
      HAEORUM_MSSQL_PRODUCT_ID_COLUMN: "${HAEORUM_MSSQL_PRODUCT_ID_COLUMN:-product_id}"
      HAEORUM_MSSQL_UPDATED_AT_COLUMN: "${HAEORUM_MSSQL_UPDATED_AT_COLUMN:-updated_at}"
      HAEORUM_MSSQL_SYNC_FETCH_SIZE: "${HAEORUM_MSSQL_SYNC_FETCH_SIZE:-1000}"

  reindex-once:
    build:
      args:
        INSTALL_MSSQL_ODBC: "true"
        ACCEPT_MS_ODBC_EULA: "true"
    environment:
      HAEORUM_PRODUCT_CSV: ""
      HAEORUM_MSSQL_READONLY_CONNECTION_STRING: "${HAEORUM_MSSQL_READONLY_CONNECTION_STRING:?Set HAEORUM_MSSQL_READONLY_CONNECTION_STRING for local MSSQL reindex}"
      HAEORUM_MSSQL_PRODUCT_ID_COLUMN: "${HAEORUM_MSSQL_PRODUCT_ID_COLUMN:-product_id}"
      HAEORUM_MSSQL_UPDATED_AT_COLUMN: "${HAEORUM_MSSQL_UPDATED_AT_COLUMN:-updated_at}"
      HAEORUM_MSSQL_SYNC_FETCH_SIZE: "${HAEORUM_MSSQL_SYNC_FETCH_SIZE:-1000}"

  sync-worker:
    build:
      args:
        INSTALL_MSSQL_ODBC: "true"
        ACCEPT_MS_ODBC_EULA: "true"
    environment:
      HAEORUM_PRODUCT_CSV: ""
      HAEORUM_MSSQL_READONLY_CONNECTION_STRING: "${HAEORUM_MSSQL_READONLY_CONNECTION_STRING:?Set HAEORUM_MSSQL_READONLY_CONNECTION_STRING for local MSSQL sync}"
      HAEORUM_MSSQL_PRODUCT_ID_COLUMN: "${HAEORUM_MSSQL_PRODUCT_ID_COLUMN:-product_id}"
      HAEORUM_MSSQL_UPDATED_AT_COLUMN: "${HAEORUM_MSSQL_UPDATED_AT_COLUMN:-updated_at}"
      HAEORUM_MSSQL_SYNC_FETCH_SIZE: "${HAEORUM_MSSQL_SYNC_FETCH_SIZE:-1000}"
