<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Haeorum AI Search Demo</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #101828;
      --muted: #667085;
      --line: #d8dee6;
      --soft: #eef2f6;
      --brand: #d7252a;
      --brand-dark: #b91c1c;
      --teal: #0f766e;
      --blue: #2563eb;
      --amber: #b45309;
      --good: #067647;
      --bad: #b42318;
      --shadow: 0 10px 24px rgba(16, 24, 40, .07);
    }

    * { box-sizing: border-box; letter-spacing: 0; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, "Noto Sans KR", sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      min-height: 38px;
      padding: 0 12px;
      border-radius: 6px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover { border-color: #9aa4b2; }

    button.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    button.primary:hover {
      background: var(--brand-dark);
      border-color: var(--brand-dark);
    }

    button.secondary {
      color: var(--teal);
      border-color: rgba(15, 118, 110, .35);
    }

    button:disabled {
      cursor: wait;
      opacity: .58;
    }

    .wrap {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .topbar {
      min-height: 72px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--amber);
    }

    .dot.ok { background: var(--good); }
    .dot.bad { background: var(--bad); }

    main {
      padding: 18px 0 36px;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 16px;
      display: grid;
      gap: 14px;
      position: sticky;
      top: 14px;
    }

    label,
    .section-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      margin: 0 0 8px;
    }

    textarea,
    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      outline: none;
      padding: 10px 12px;
      font-size: 15px;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    textarea:focus,
    input[type="text"]:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(215, 37, 42, .13);
    }

    .query-row {
      display: grid;
      grid-template-columns: 1fr 86px;
      gap: 8px;
    }

    .actions,
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chips button {
      min-height: 32px;
      padding: 0 10px;
      font-size: 13px;
      font-weight: 800;
      background: var(--soft);
      border-color: transparent;
    }

    .chips button:hover {
      border-color: #bcc5d1;
      background: #fff;
    }

    .dropzone {
      min-height: 170px;
      border: 1px dashed #aeb8c6;
      border-radius: 8px;
      background: #fbfcfe;
      display: grid;
      place-items: center;
      overflow: hidden;
      text-align: center;
      color: var(--muted);
      cursor: pointer;
    }

    .dropzone.dragging {
      border-color: var(--brand);
      box-shadow: inset 0 0 0 2px rgba(215, 37, 42, .12);
    }

    .dropzone img {
      width: 100%;
      height: 100%;
      max-height: 260px;
      object-fit: contain;
      background: #fff;
    }

    .file-meta {
      min-height: 20px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 76px;
    }

    .metric span {
      color: var(--muted);
      display: block;
      font-size: 12px;
      font-weight: 900;
    }

    .metric b {
      display: block;
      margin-top: 5px;
      font-size: 20px;
      line-height: 1.15;
    }

    .notice {
      min-height: 22px;
      margin: 0 0 12px;
      color: var(--bad);
      font-size: 13px;
      font-weight: 700;
    }

    .run-note {
      min-height: 22px;
      margin: -4px 0 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .results {
      display: grid;
      gap: 10px;
    }

    .item {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr) 84px;
      gap: 14px;
      align-items: start;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      min-height: 126px;
    }

    .thumb {
      width: 104px;
      height: 104px;
      border-radius: 6px;
      object-fit: cover;
      background: #edf1f5;
      border: 1px solid #e6ebf1;
    }

    .item h2 {
      margin: 1px 0 8px;
      font-size: 16px;
      line-height: 1.35;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .item p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      max-width: 100%;
      border-radius: 999px;
      background: #f1f5f9;
      color: #344054;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 800;
      margin: 0 0 8px;
    }

    .score {
      text-align: right;
      color: var(--teal);
      font-weight: 900;
      font-size: 15px;
    }

    .bar {
      height: 6px;
      margin-top: 7px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--teal);
    }

    .empty,
    .loading {
      min-height: 300px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: var(--panel);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 800;
    }

    .loading {
      color: var(--blue);
      background: linear-gradient(90deg, #fff, #f7fbff, #fff);
      background-size: 220% 100%;
      animation: shimmer 1.2s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -120% 0; }
    }

    @media (max-width: 920px) {
      .topbar,
      .layout {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .wrap {
        width: min(100vw - 20px, 520px);
      }

      .query-row {
        grid-template-columns: 1fr 74px;
      }

      .item {
        grid-template-columns: 82px minmax(0, 1fr);
      }

      .thumb {
        width: 82px;
        height: 82px;
      }

      .score {
        grid-column: 2;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1>해오름 AI 검색 체감 테스트</h1>
        <p class="subtitle">로컬 Marqo/Gemini 서버에 직접 연결 중</p>
      </div>
      <div class="status"><span id="healthDot" class="dot"></span><span id="healthText">확인 중</span></div>
    </div>
  </header>

  <main class="wrap">
    <div class="layout">
      <section class="panel controls">
        <div>
          <label for="query">검색어</label>
          <textarea id="query">스텐텀블러</textarea>
        </div>

        <div class="query-row">
          <input id="limit" type="text" value="8" aria-label="결과 수">
          <button id="searchBtn" class="primary">검색</button>
        </div>

        <div>
          <div class="section-label">정확도 샘플</div>
          <div class="chips">
            <button data-query="스텐텀블러">스텐텀블러</button>
            <button data-query="검은 3단 우산">검은 3단 우산</button>
            <button data-query="골프공 12구">골프공 12구</button>
            <button data-query="스마트폰 충전 케이블">충전 케이블</button>
            <button data-query="보틀오프너">보틀오프너</button>
            <button data-query="냄비 손잡이">냄비 손잡이</button>
            <button data-query="크리스탈 감사패">크리스탈 감사패</button>
            <button data-query="손소독티슈">손소독티슈</button>
          </div>
        </div>

        <div>
          <div class="section-label">이미지</div>
          <input id="imageInput" type="file" accept="image/png,image/jpeg,image/webp">
          <div id="dropzone" class="dropzone" role="button" tabindex="0">이미지 선택</div>
          <div id="fileMeta" class="file-meta">선택된 이미지 없음</div>
        </div>

        <div class="actions">
          <button id="clearImageBtn">이미지 제거</button>
          <button id="batchBtn" class="secondary">10건 동시</button>
        </div>
      </section>

      <section>
        <div class="summary">
          <div class="metric"><span>API 시간</span><b id="apiMs">-</b></div>
          <div class="metric"><span>전체 시간</span><b id="wallMs">-</b></div>
          <div class="metric"><span>검색 유형</span><b id="queryType">-</b></div>
          <div class="metric"><span>결과</span><b id="count">-</b></div>
        </div>
        <p id="runNote" class="run-note">대기 중</p>
        <p id="notice" class="notice"></p>
        <div id="results" class="results">
          <div class="empty">검색 결과 대기 중</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const API_BASE = "http://127.0.0.1:8120";
    const API_KEY = "public-shop001-dev-key";
    const MALL_ID = "shop001";
    const MAX_IMAGE_DIMENSION = 640;
    const CONCURRENT_REQUESTS = 10;

    let imageDataUrl = "";
    let imageMeta = null;
    let latestController = null;

    const $ = (id) => document.getElementById(id);

    async function health() {
      try {
        const res = await fetch(`${API_BASE}/health`);
        const data = await res.json();
        const lastEmbeddingError = data.gemini?.usage?.last_error || "";
        const capacityBlocked = isEmbeddingCapacityBlocked(lastEmbeddingError);
        const ok = Boolean(data.ready || data.ok) && !capacityBlocked;
        $("healthDot").classList.toggle("ok", ok);
        $("healthDot").classList.toggle("bad", !ok);
        const engine = data.engine || "-";
        const model = data.gemini_model || data.gemini?.model || "-";
        const index = data.index || "-";
        $("healthText").textContent = capacityBlocked
          ? "사진/검색어 처리 크레딧 소진 - 새 검색 불가"
          : `${engine} / ${model} / ${index}`;
      } catch (error) {
        $("healthDot").classList.add("bad");
        $("healthText").textContent = "API 연결 실패";
      }
    }

    function currentPayload() {
      const q = $("query").value.trim();
      const limit = Math.max(1, Math.min(20, Number($("limit").value || 8)));
      const payload = { mall_id: MALL_ID, limit };
      if (q) payload.q = q;
      if (imageDataUrl) payload.image_base64 = imageDataUrl;
      return payload;
    }

    function hasSearchInput(payload) {
      return Boolean(payload.q || payload.image_base64);
    }

    function setBusy(value, label = "검색") {
      $("searchBtn").disabled = value;
      $("batchBtn").disabled = value;
      $("searchBtn").textContent = value ? "검색 중" : label;
    }

    function setLoading(text) {
      $("results").innerHTML = `<div class="loading">${escapeHtml(text)}</div>`;
    }

    async function searchApi(payload, signal) {
      const started = performance.now();
      const res = await fetch(`${API_BASE}/api/ai-search`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json; charset=utf-8",
          "X-API-Key": API_KEY
        },
        body: JSON.stringify(payload),
        signal
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(apiErrorMessage(res.status, data));
      }
      return { data, wallMs: performance.now() - started };
    }

    function apiErrorMessage(status, data) {
      const raw = String((data && (data.detail || data.message)) || "");
      if (isEmbeddingCapacityBlocked(raw)) {
        return "사진/검색어 처리 크레딧이 소진되어 새 검색을 만들 수 없습니다. Gemini 결제/크레딧을 보충하면 바로 정상 동작합니다.";
      }
      if (status === 401 || status === 403) {
        return "현재 사이트에서 AI 검색을 사용할 수 없습니다.";
      }
      if (status === 413) {
        return "이미지 용량이 제한을 초과했습니다.";
      }
      if (status === 429) {
        return "요청이 많습니다. 잠시 후 다시 검색해 주세요.";
      }
      if (status >= 500) {
        return "AI 검색 서버 응답이 지연되고 있습니다. 잠시 후 다시 시도해 주세요.";
      }
      return raw || `HTTP ${status}`;
    }

    function isEmbeddingCapacityBlocked(value) {
      return /gemini backend unavailable|resource_exhausted|prepayment credits|quota/i.test(String(value || ""));
    }

    async function search() {
      const payload = currentPayload();
      if (!hasSearchInput(payload)) {
        $("notice").textContent = "검색어 또는 이미지를 넣어주세요.";
        return;
      }
      latestController?.abort();
      latestController = new AbortController();
      setBusy(true);
      $("notice").textContent = "";
      $("runNote").textContent = imageMeta ? `${imageMeta.name} / ${imageMeta.normalizedLabel}` : "단일 검색";
      setLoading("검색 중");
      try {
        const { data, wallMs } = await searchApi(payload, latestController.signal);
        render(data, wallMs);
      } catch (error) {
        if (error.name !== "AbortError") {
          $("notice").textContent = error.message;
          $("results").innerHTML = `<div class="empty">검색 실패</div>`;
        }
      } finally {
        setBusy(false);
      }
    }

    async function runConcurrentSearch() {
      const payload = currentPayload();
      if (!hasSearchInput(payload)) {
        $("notice").textContent = "검색어 또는 이미지를 넣어주세요.";
        return;
      }
      setBusy(true);
      $("notice").textContent = "";
      setLoading("10건 동시 실행 중");
      const started = performance.now();
      try {
        const jobs = Array.from({ length: CONCURRENT_REQUESTS }, () => searchApi(payload));
        const settled = await Promise.allSettled(jobs);
        const successes = settled
          .filter((item) => item.status === "fulfilled")
          .map((item) => item.value);
        const failures = settled.length - successes.length;
        if (!successes.length) {
          throw new Error("10건 모두 실패했습니다.");
        }
        const latencies = successes.map((item) => item.wallMs).sort((a, b) => a - b);
        const p95 = latencies[Math.min(latencies.length - 1, Math.ceil(latencies.length * .95) - 1)];
        const avg = latencies.reduce((sum, value) => sum + value, 0) / latencies.length;
        $("runNote").textContent =
          `10건 동시: 성공 ${successes.length}/${CONCURRENT_REQUESTS}, 실패 ${failures}, 평균 ${avg.toFixed(0)}ms, 느린 쪽 ${p95.toFixed(0)}ms`;
        render(successes[0].data, performance.now() - started);
      } catch (error) {
        $("notice").textContent = error.message;
        $("results").innerHTML = `<div class="empty">동시 테스트 실패</div>`;
      } finally {
        setBusy(false);
      }
    }

    function resultRows(data) {
      const rows = [...(data.top || []), ...(data.items || [])];
      const seen = new Set();
      return rows.filter((item) => {
        const key = `${item.mall_id || ""}:${item.product_id || item.name || ""}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function render(data, wallMs) {
      const rows = resultRows(data);
      const meta = data.meta || {};
      $("apiMs").textContent = `${meta.elapsed_ms ?? "-"} ms`;
      $("wallMs").textContent = `${wallMs.toFixed(1)} ms`;
      $("queryType").textContent = queryTypeLabel(meta.query_type);
      $("count").textContent = String(rows.length);
      $("notice").textContent = meta.notice || "";
      if (!$("runNote").textContent || $("runNote").textContent === "대기 중") {
        $("runNote").textContent = `${queryTypeLabel(meta.query_type)} / ${rows.length}개`;
      }
      if (!rows.length) {
        $("results").innerHTML = `<div class="empty">결과 없음</div>`;
        return;
      }
      $("results").innerHTML = rows.map((item) => resultCard(item)).join("");
    }

    function resultCard(item) {
      const score = Math.max(0, Math.min(100, Number(item.score_percent || 0)));
      const image = item.image_url
        ? `<img class="thumb" src="${escapeAttr(item.image_url)}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">`
        : `<div class="thumb"></div>`;
      const name = escapeHtml(item.name || "");
      const productId = escapeHtml(item.product_id || "");
      const category = escapeHtml(item.category || "카테고리 없음");
      const price = formatPrice(item.price);
      const title = item.product_url
        ? `<a href="${escapeAttr(item.product_url)}" target="_blank" rel="noopener">${name}</a>`
        : name;
      return `
        <article class="item">
          ${image}
          <div>
            <div class="pill">${category}</div>
            <h2>${title}</h2>
            <p>${productId}${price ? ` · ${price}` : ""}</p>
          </div>
          <div class="score">
            ${score.toFixed(1)}%
            <div class="bar"><span style="width:${score.toFixed(1)}%"></span></div>
          </div>
        </article>
      `;
    }

    async function handleImageFile(file) {
      if (!file) return;
      $("notice").textContent = "";
      const originalBytes = file.size;
      const raw = await readFileDataUrl(file);
      const normalized = await resizeImageDataUrl(raw, file.type);
      imageDataUrl = normalized.dataUrl;
      imageMeta = {
        name: file.name,
        originalBytes,
        normalizedBytes: dataUrlBytes(imageDataUrl),
        width: normalized.width,
        height: normalized.height,
        normalizedLabel: `${normalized.width}x${normalized.height}, ${formatBytes(dataUrlBytes(imageDataUrl))}`
      };
      $("dropzone").innerHTML = `<img src="${imageDataUrl}" alt="">`;
      $("fileMeta").textContent =
        `${file.name} / 원본 ${formatBytes(originalBytes)} / 검색용 ${imageMeta.normalizedLabel}`;
    }

    function readFileDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("파일을 읽지 못했습니다."));
        reader.readAsDataURL(file);
      });
    }

    function resizeImageDataUrl(dataUrl, fileType) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, MAX_IMAGE_DIMENSION / Math.max(img.naturalWidth, img.naturalHeight));
          const width = Math.max(1, Math.round(img.naturalWidth * scale));
          const height = Math.max(1, Math.round(img.naturalHeight * scale));
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext("2d", { alpha: false });
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, width, height);
          ctx.drawImage(img, 0, 0, width, height);
          const outputType = fileType === "image/png" && scale === 1 ? "image/png" : "image/jpeg";
          resolve({ dataUrl: canvas.toDataURL(outputType, .9), width, height });
        };
        img.onerror = () => reject(new Error("이미지를 열지 못했습니다."));
        img.src = dataUrl;
      });
    }

    function clearImage() {
      imageDataUrl = "";
      imageMeta = null;
      $("imageInput").value = "";
      $("dropzone").textContent = "이미지 선택";
      $("fileMeta").textContent = "선택된 이미지 없음";
    }

    function queryTypeLabel(value) {
      if (value === "text") return "텍스트";
      if (value === "image") return "이미지";
      if (value === "text_image") return "텍스트+이미지";
      return value || "-";
    }

    function formatPrice(value) {
      const number = Number(value);
      if (!Number.isFinite(number) || number <= 0) return "";
      return `${number.toLocaleString("ko-KR")}원`;
    }

    function formatBytes(value) {
      if (!Number.isFinite(value) || value <= 0) return "0B";
      if (value >= 1024 * 1024) return `${(value / 1024 / 1024).toFixed(1)}MB`;
      return `${Math.round(value / 1024)}KB`;
    }

    function dataUrlBytes(value) {
      const base64 = String(value || "").split(",", 2)[1] || "";
      return Math.round(base64.length * 3 / 4);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    $("searchBtn").addEventListener("click", search);
    $("batchBtn").addEventListener("click", runConcurrentSearch);
    $("clearImageBtn").addEventListener("click", clearImage);
    $("query").addEventListener("keydown", (event) => {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) search();
    });

    document.querySelectorAll("[data-query]").forEach((button) => {
      button.addEventListener("click", () => {
        $("query").value = button.dataset.query || "";
        search();
      });
    });

    $("imageInput").addEventListener("change", () => {
      handleImageFile($("imageInput").files?.[0]).catch((error) => {
        $("notice").textContent = error.message;
      });
    });

    $("dropzone").addEventListener("click", () => $("imageInput").click());
    $("dropzone").addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        $("imageInput").click();
      }
    });
    $("dropzone").addEventListener("dragover", (event) => {
      event.preventDefault();
      $("dropzone").classList.add("dragging");
    });
    $("dropzone").addEventListener("dragleave", () => {
      $("dropzone").classList.remove("dragging");
    });
    $("dropzone").addEventListener("drop", (event) => {
      event.preventDefault();
      $("dropzone").classList.remove("dragging");
      handleImageFile(event.dataTransfer?.files?.[0]).catch((error) => {
        $("notice").textContent = error.message;
      });
    });

    health();
  </script>
</body>
</html>
