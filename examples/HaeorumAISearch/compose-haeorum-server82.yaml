name: haeorum-ai-search-marqo

x-server82-runtime-env: &server82-runtime-env
  HAEORUM_MALL_CONFIG_PATH: "${HAEORUM_MALL_CONFIG_PATH:-/etc/haeorum-ai-search/malls.json}"
  HAEORUM_QUERY_SYNONYM_PATH: "${HAEORUM_QUERY_SYNONYM_PATH:-/etc/haeorum-ai-search/query-synonyms.json}"
  HAEORUM_CORS_ORIGINS: "${HAEORUM_CORS_ORIGINS:-}"
  HAEORUM_CORS_ORIGINS_FILE: "${HAEORUM_CORS_ORIGINS_FILE:-/etc/haeorum-ai-search/cors-origins.txt}"
  HAEORUM_PRODUCT_CSV: "${HAEORUM_PRODUCT_CSV:-}"
  HAEORUM_MSSQL_READONLY_CONNECTION_STRING: "${HAEORUM_MSSQL_READONLY_CONNECTION_STRING:-}"
  HAEORUM_MSSQL_CONNECTION_STRING: "${HAEORUM_MSSQL_CONNECTION_STRING:-}"
  HAEORUM_MSSQL_ALLOW_TRUST_SERVER_CERTIFICATE: "${HAEORUM_MSSQL_ALLOW_TRUST_SERVER_CERTIFICATE:-false}"
  HAEORUM_MSSQL_QUERY: "${HAEORUM_MSSQL_QUERY:-SELECT CAST(p_idx AS varchar(100)) AS product_id, product_name, LEFT(COALESCE(NULLIF(category_name1, ''), NULLIF(category_name2, ''), NULLIF(category_name3, ''), NULLIF(category_name4, ''), ''), 100) AS category_name, TRY_CONVERT(float, price) AS price, TRY_CONVERT(float, price) AS price_min, TRY_CONVERT(float, price) AS price_max, CAST('' AS nvarchar(4000)) AS print_methods, CAST('' AS nvarchar(4000)) AS materials, CAST('' AS nvarchar(4000)) AS colors, CAST(NULL AS int) AS min_order_qty, CAST(NULL AS int) AS delivery_days, CAST(p_idx AS varchar(100)) AS product_group_id, main_image_url, product_url, status, updated_at, CAST(CASE WHEN TRY_CONVERT(int, status) = 1 OR LTRIM(RTRIM(CAST(status AS nvarchar(32)))) = NCHAR(49849) + NCHAR(51064) THEN 0 ELSE 1 END AS bit) AS is_deleted, CASE WHEN TRY_CONVERT(int, status) = 1 OR LTRIM(RTRIM(CAST(status AS nvarchar(32)))) = NCHAR(49849) + NCHAR(51064) THEN 'Y' ELSE 'N' END AS display_yn, CAST(COALESCE(NULLIF(CAST(mall_id AS varchar(64)), ''), 'haeorumgift') AS varchar(64)) AS mall_id FROM dbo.v_ai_search_products WHERE p_idx IS NOT NULL AND product_name IS NOT NULL AND LTRIM(RTRIM(product_name)) <> ''}"
  HAEORUM_MSSQL_PRODUCT_ID_COLUMN: "${HAEORUM_MSSQL_PRODUCT_ID_COLUMN:-product_id}"
  HAEORUM_MSSQL_UPDATED_AT_COLUMN: "${HAEORUM_MSSQL_UPDATED_AT_COLUMN:-updated_at}"
  HAEORUM_MSSQL_SYNC_FETCH_SIZE: "${HAEORUM_MSSQL_SYNC_FETCH_SIZE:-1000}"
  HAEORUM_PRODUCT_URL_TEMPLATE: "${HAEORUM_PRODUCT_URL_TEMPLATE:-https://www.jclgift.com/product_w/product_view.asp?p_idx={product_id}}"
  HAEORUM_FILTER_BY_MALL_ID: "${HAEORUM_FILTER_BY_MALL_ID:-false}"
  HAEORUM_GEMINI_QUERY_IMAGE_BATCH_SIZE: "${HAEORUM_GEMINI_QUERY_IMAGE_BATCH_SIZE:-1}"
  HAEORUM_GEMINI_QUERY_IMAGE_BATCH_WAIT_MS: "${HAEORUM_GEMINI_QUERY_IMAGE_BATCH_WAIT_MS:-0}"
  HAEORUM_QUERY_IMAGE_MAX_DIMENSION: "${HAEORUM_QUERY_IMAGE_MAX_DIMENSION:-640}"
  HAEORUM_QUERY_IMAGE_ANALYSIS: "${HAEORUM_QUERY_IMAGE_ANALYSIS:-false}"

x-server82-runtime-volumes: &server82-runtime-volumes
  - /etc/haeorum-ai-search:/etc/haeorum-ai-search:ro
  - /var/log/haeorum-ai-search:/app/logs

services:
  ai-search:
    environment: *server82-runtime-env
    volumes: *server82-runtime-volumes

  reindex-once:
    environment: *server82-runtime-env
    volumes: *server82-runtime-volumes

  sync-worker:
    environment: *server82-runtime-env
    volumes: *server82-runtime-volumes

