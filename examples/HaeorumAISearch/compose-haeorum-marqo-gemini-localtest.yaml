name: haeorum-ai-search-marqo

services:
  embedding-service:
    environment:
      GEMINI_AUTH_MODE: "${GEMINI_AUTH_MODE:-api_key}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:?Set GEMINI_API_KEY for local Gemini API key tests}"
      GEMINI_PROVIDER_RETRY_COUNT: "${GEMINI_PROVIDER_RETRY_COUNT:-3}"
      GEMINI_PROVIDER_RETRY_DELAY_SECONDS: "${GEMINI_PROVIDER_RETRY_DELAY_SECONDS:-10}"
      GEMINI_PROVIDER_RETRY_MAX_DELAY_SECONDS: "${GEMINI_PROVIDER_RETRY_MAX_DELAY_SECONDS:-60}"

  ai-search:
    environment:
      HAEORUM_PRODUCT_CSV: "/data/jclgift-products-1800-supported.csv"
      HAEORUM_INDEX_NAME: "${HAEORUM_INDEX_NAME:-haeorum-gemini-marqo-jclgift}"
      HAEORUM_CORS_ORIGINS: "${HAEORUM_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,https://shop001.haeorumgift.com}"
      HAEORUM_CACHE_TTL_SECONDS: "${HAEORUM_CACHE_TTL_SECONDS:-120}"
      HAEORUM_SEARCH_MAX_CONCURRENCY: "${HAEORUM_SEARCH_MAX_CONCURRENCY:-64}"
      HAEORUM_IMAGE_SEARCH_MAX_CONCURRENCY: "${HAEORUM_IMAGE_SEARCH_MAX_CONCURRENCY:-8}"
      HAEORUM_API_THREADPOOL_TOKENS: "${HAEORUM_API_THREADPOOL_TOKENS:-96}"
      HAEORUM_BACKEND_HTTP_MAX_ACTIVE_REQUESTS: "${HAEORUM_BACKEND_HTTP_MAX_ACTIVE_REQUESTS:-96}"
      HAEORUM_MARQO_ADD_DOCUMENTS_BATCH_SIZE: "${HAEORUM_MARQO_ADD_DOCUMENTS_BATCH_SIZE:-8}"
      HAEORUM_MARQO_ADD_DOCUMENTS_MAX_REQUEST_BYTES: "${HAEORUM_MARQO_ADD_DOCUMENTS_MAX_REQUEST_BYTES:-2097152}"
      HAEORUM_PRODUCT_IMAGE_DOWNLOAD_THREAD_COUNT: "${HAEORUM_PRODUCT_IMAGE_DOWNLOAD_THREAD_COUNT:-1}"
      HAEORUM_MARQO_SEARCH_RETRY_COUNT: "${HAEORUM_MARQO_SEARCH_RETRY_COUNT:-1}"
      HAEORUM_MARQO_SEARCH_RETRY_DELAY_SECONDS: "${HAEORUM_MARQO_SEARCH_RETRY_DELAY_SECONDS:-0.1}"
      HAEORUM_BACKEND_RETRY_AFTER_MAX_SECONDS: "${HAEORUM_BACKEND_RETRY_AFTER_MAX_SECONDS:-2}"
      HAEORUM_BACKEND_CIRCUIT_FAILURE_THRESHOLD: "${HAEORUM_BACKEND_CIRCUIT_FAILURE_THRESHOLD:-5}"
      HAEORUM_GEMINI_QUERY_TIMEOUT_SECONDS: "${HAEORUM_GEMINI_QUERY_TIMEOUT_SECONDS:-30}"
      HAEORUM_GEMINI_MIXED_QUERY_PARALLELISM: "${HAEORUM_GEMINI_MIXED_QUERY_PARALLELISM:-8}"
      HAEORUM_GEMINI_QUERY_IMAGE_BATCH_SIZE: "${HAEORUM_GEMINI_QUERY_IMAGE_BATCH_SIZE:-1}"
      HAEORUM_GEMINI_QUERY_IMAGE_BATCH_WAIT_MS: "${HAEORUM_GEMINI_QUERY_IMAGE_BATCH_WAIT_MS:-0}"
      HAEORUM_QUERY_IMAGE_MAX_DIMENSION: "${HAEORUM_QUERY_IMAGE_MAX_DIMENSION:-640}"
      HAEORUM_QUERY_IMAGE_ANALYSIS: "${HAEORUM_QUERY_IMAGE_ANALYSIS:-false}"
    volumes:
      - ./logs:/data:ro

  reindex-once:
    environment:
      HAEORUM_PRODUCT_CSV: "/data/jclgift-products-1800-supported.csv"
      HAEORUM_INDEX_NAME: "${HAEORUM_INDEX_NAME:-haeorum-gemini-marqo-jclgift}"
      HAEORUM_CORS_ORIGINS: "${HAEORUM_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,https://shop001.haeorumgift.com}"
      HAEORUM_MARQO_ADD_DOCUMENTS_BATCH_SIZE: "${HAEORUM_MARQO_ADD_DOCUMENTS_BATCH_SIZE:-8}"
      HAEORUM_MARQO_ADD_DOCUMENTS_MAX_REQUEST_BYTES: "${HAEORUM_MARQO_ADD_DOCUMENTS_MAX_REQUEST_BYTES:-2097152}"
      HAEORUM_PRODUCT_IMAGE_DOWNLOAD_THREAD_COUNT: "${HAEORUM_PRODUCT_IMAGE_DOWNLOAD_THREAD_COUNT:-1}"
      HAEORUM_MARQO_SEARCH_RETRY_COUNT: "${HAEORUM_MARQO_SEARCH_RETRY_COUNT:-1}"
      HAEORUM_MARQO_SEARCH_RETRY_DELAY_SECONDS: "${HAEORUM_MARQO_SEARCH_RETRY_DELAY_SECONDS:-0.1}"
      HAEORUM_BACKEND_RETRY_AFTER_MAX_SECONDS: "${HAEORUM_BACKEND_RETRY_AFTER_MAX_SECONDS:-2}"
      HAEORUM_BACKEND_CIRCUIT_FAILURE_THRESHOLD: "${HAEORUM_BACKEND_CIRCUIT_FAILURE_THRESHOLD:-5}"
      HAEORUM_GEMINI_QUERY_TIMEOUT_SECONDS: "${HAEORUM_GEMINI_QUERY_TIMEOUT_SECONDS:-30}"
      HAEORUM_GEMINI_MIXED_QUERY_PARALLELISM: "${HAEORUM_GEMINI_MIXED_QUERY_PARALLELISM:-8}"
      HAEORUM_GEMINI_QUERY_IMAGE_BATCH_SIZE: "${HAEORUM_GEMINI_QUERY_IMAGE_BATCH_SIZE:-1}"
      HAEORUM_GEMINI_QUERY_IMAGE_BATCH_WAIT_MS: "${HAEORUM_GEMINI_QUERY_IMAGE_BATCH_WAIT_MS:-0}"
      HAEORUM_QUERY_IMAGE_MAX_DIMENSION: "${HAEORUM_QUERY_IMAGE_MAX_DIMENSION:-640}"
      HAEORUM_QUERY_IMAGE_ANALYSIS: "${HAEORUM_QUERY_IMAGE_ANALYSIS:-false}"
    volumes:
      - ./logs:/data:ro

  sync-worker:
    environment:
      HAEORUM_PRODUCT_CSV: "/data/jclgift-products-1800-supported.csv"
      HAEORUM_INDEX_NAME: "${HAEORUM_INDEX_NAME:-haeorum-gemini-marqo-jclgift}"
      HAEORUM_CORS_ORIGINS: "${HAEORUM_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,https://shop001.haeorumgift.com}"
    volumes:
      - ./logs:/data:ro
