name: haeorum-ai-search-marqo

services:
  embedding-service:
    environment:
      GEMINI_AUTH_MODE: "${GEMINI_AUTH_MODE:-adc}"
      GEMINI_QUOTA_PROJECT: "${GEMINI_QUOTA_PROJECT:?Set GEMINI_QUOTA_PROJECT for local ADC Gemini tests}"
      GOOGLE_APPLICATION_CREDENTIALS: "/gcp/application_default_credentials.json"
      GEMINI_PROVIDER_RETRY_COUNT: "${GEMINI_PROVIDER_RETRY_COUNT:-3}"
      GEMINI_PROVIDER_RETRY_DELAY_SECONDS: "${GEMINI_PROVIDER_RETRY_DELAY_SECONDS:-10}"
      GEMINI_PROVIDER_RETRY_MAX_DELAY_SECONDS: "${GEMINI_PROVIDER_RETRY_MAX_DELAY_SECONDS:-60}"
    volumes:
      - "${GOOGLE_APPLICATION_CREDENTIALS_HOST:-./.gcloud/application_default_credentials.json}:/gcp/application_default_credentials.json:ro"

  ai-search:
    environment:
      HAEORUM_PRODUCT_CSV: "/data/jclgift-products-1800-supported.csv"
      HAEORUM_INDEX_NAME: "${HAEORUM_INDEX_NAME:-haeorum-gemini-marqo-jclgift}"
      HAEORUM_CACHE_TTL_SECONDS: "${HAEORUM_CACHE_TTL_SECONDS:-120}"
      HAEORUM_SEARCH_MAX_CONCURRENCY: "${HAEORUM_SEARCH_MAX_CONCURRENCY:-24}"
      HAEORUM_IMAGE_SEARCH_MAX_CONCURRENCY: "${HAEORUM_IMAGE_SEARCH_MAX_CONCURRENCY:-4}"
      HAEORUM_API_THREADPOOL_TOKENS: "${HAEORUM_API_THREADPOOL_TOKENS:-40}"
      HAEORUM_BACKEND_HTTP_MAX_ACTIVE_REQUESTS: "${HAEORUM_BACKEND_HTTP_MAX_ACTIVE_REQUESTS:-40}"
      HAEORUM_MARQO_ADD_DOCUMENTS_BATCH_SIZE: "${HAEORUM_MARQO_ADD_DOCUMENTS_BATCH_SIZE:-8}"
      HAEORUM_MARQO_ADD_DOCUMENTS_MAX_REQUEST_BYTES: "${HAEORUM_MARQO_ADD_DOCUMENTS_MAX_REQUEST_BYTES:-2097152}"
      HAEORUM_PRODUCT_IMAGE_DOWNLOAD_THREAD_COUNT: "${HAEORUM_PRODUCT_IMAGE_DOWNLOAD_THREAD_COUNT:-1}"
      HAEORUM_MARQO_SEARCH_RETRY_COUNT: "${HAEORUM_MARQO_SEARCH_RETRY_COUNT:-8}"
      HAEORUM_MARQO_SEARCH_RETRY_DELAY_SECONDS: "${HAEORUM_MARQO_SEARCH_RETRY_DELAY_SECONDS:-5}"
      HAEORUM_BACKEND_RETRY_AFTER_MAX_SECONDS: "${HAEORUM_BACKEND_RETRY_AFTER_MAX_SECONDS:-90}"
      HAEORUM_BACKEND_CIRCUIT_FAILURE_THRESHOLD: "${HAEORUM_BACKEND_CIRCUIT_FAILURE_THRESHOLD:-20}"
      HAEORUM_GEMINI_QUERY_TIMEOUT_SECONDS: "${HAEORUM_GEMINI_QUERY_TIMEOUT_SECONDS:-30}"
      HAEORUM_GEMINI_MIXED_QUERY_PARALLELISM: "${HAEORUM_GEMINI_MIXED_QUERY_PARALLELISM:-2}"
    volumes:
      - ./logs:/data:ro

  reindex-once:
    environment:
      HAEORUM_PRODUCT_CSV: "/data/jclgift-products-1800-supported.csv"
      HAEORUM_INDEX_NAME: "${HAEORUM_INDEX_NAME:-haeorum-gemini-marqo-jclgift}"
      HAEORUM_MARQO_ADD_DOCUMENTS_BATCH_SIZE: "${HAEORUM_MARQO_ADD_DOCUMENTS_BATCH_SIZE:-8}"
      HAEORUM_MARQO_ADD_DOCUMENTS_MAX_REQUEST_BYTES: "${HAEORUM_MARQO_ADD_DOCUMENTS_MAX_REQUEST_BYTES:-2097152}"
      HAEORUM_PRODUCT_IMAGE_DOWNLOAD_THREAD_COUNT: "${HAEORUM_PRODUCT_IMAGE_DOWNLOAD_THREAD_COUNT:-1}"
      HAEORUM_MARQO_SEARCH_RETRY_COUNT: "${HAEORUM_MARQO_SEARCH_RETRY_COUNT:-8}"
      HAEORUM_MARQO_SEARCH_RETRY_DELAY_SECONDS: "${HAEORUM_MARQO_SEARCH_RETRY_DELAY_SECONDS:-5}"
      HAEORUM_BACKEND_RETRY_AFTER_MAX_SECONDS: "${HAEORUM_BACKEND_RETRY_AFTER_MAX_SECONDS:-90}"
      HAEORUM_BACKEND_CIRCUIT_FAILURE_THRESHOLD: "${HAEORUM_BACKEND_CIRCUIT_FAILURE_THRESHOLD:-20}"
      HAEORUM_GEMINI_QUERY_TIMEOUT_SECONDS: "${HAEORUM_GEMINI_QUERY_TIMEOUT_SECONDS:-30}"
      HAEORUM_GEMINI_MIXED_QUERY_PARALLELISM: "${HAEORUM_GEMINI_MIXED_QUERY_PARALLELISM:-2}"
    volumes:
      - ./logs:/data:ro

  sync-worker:
    environment:
      HAEORUM_PRODUCT_CSV: "/data/jclgift-products-1800-supported.csv"
      HAEORUM_INDEX_NAME: "${HAEORUM_INDEX_NAME:-haeorum-gemini-marqo-jclgift}"
    volumes:
      - ./logs:/data:ro
